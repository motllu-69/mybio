<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store Link | Instagram Bio</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-hover: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --primary-glow: linear-gradient(135deg, #ff007a 0%, #7928ca 100%);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Profile Header */
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: var(--primary-glow) border-box;
            object-fit: cover;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }

        /* Links & Product Cards */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: block;
            text-decoration: none;
            color: var(--text-main);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.25s ease;
            backdrop-filter: blur(10px);
        }

        .link-item:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* High-Priority Featured Product Card */
        .featured-product {
            background: var(--primary-glow);
            border: none;
            box-shadow: 0 8px 24px rgba(255, 0, 122, 0.25);
            animation: pulse 2s infinite alternate;
        }

        .featured-product:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 32px rgba(255, 0, 122, 0.4);
            background: var(--primary-glow);
        }

        .featured-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        /* Footer Icons */
        .socials {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .social-icon {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 20px;
            transition: color 0.2s;
        }

        .social-icon:hover {
            color: var(--text-main);
        }

        @keyframes pulse {
            0% { box-shadow: 0 8px 24px rgba(255, 0, 122, 0.2); }
            100% { box-shadow: 0 8px 32px rgba(121, 40, 202, 0.5); }
        }
    </style>
</head>
<body>

<div class="container">
    <img class="profile-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="Profile Picture">
    
    <h1>@yourusername</h1>
    <p class="bio">Premium Apparel & Digital Goods ⚡️<br>Worldwide shipping. Check out my latest drops below!</p>

    <div class="links-wrapper">
        <a href="https://your-shopify-or-store-link.com/product" class="link-item featured-product" target="_blank">
            <span class="featured-badge">🔥 Limited Drop</span>
            <div style="font-size: 18px;">Get the Signature Hoodie</div>
        </a>

        <a href="https://your-shopify-or-store-link.com/collections/all" class="link-item" target="_blank">
            Browse Full Shop 🛍️
        </a>

        <a href="https://your-digital-store.com/ebook" class="link-item" target="_blank">
            Download My Free Strategy Guide 📚
        </a>

        <a href="https://your-course-platform.com" class="link-item" target="_blank">
            Join the 1-on-1 Coaching Program 🎯
        </a>
    </div>

    <div class="socials">
        <a href="https://youtube.com" class="social-icon" target="_blank">YouTube</a>
        <a href="https://tiktok.com" class="social-icon" target="_blank">TikTok</a>
        <a href="https://twitter.com" class="social-icon" target="_blank">X / Twitter</a>
    </div>
</div>

</body>
</html>
