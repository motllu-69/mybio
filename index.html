<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@motllu | Links</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-hover: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-glow: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Big Title Above Image */
        .top-banner-title {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 24px 0;
            text-align: center;
            letter-spacing: -0.5px;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Profile Header */
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: var(--accent-glow) border-box;
            object-fit: cover;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }

        /* Links & Product Cards */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: block;
            text-decoration: none;
            color: var(--text-main);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.25s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .link-item:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .uid-number {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: normal;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Big Title Above Image -->
    <div class="top-banner-title">M O T U..Motllu HANDLE Links</div>

    <!-- Profile Image Avatar (Using your working image name setup) -->
    <img class="profile-img" src="avatar.png" alt="Profile Picture">
    
    <!-- User Handles & Bio Info -->
    <h1>@motllu (gamer)</h1>
    <p class="bio">hey there! me motu also known motllu (part time gamer) check my all handles here and drop a rating or follow me ;-;</p>

    <div class="links-wrapper">
        <!-- 1st Button: YouTube -->
        <a href="https://youtube.com/@motllugaming?si=WHJTxWYa711FzVej" class="link-item" target="_blank">
            YouTube Channel 🤤
        </a>

        <!-- 2nd Button: Instagram -->
        <a href="https://www.instagram.com/motllubhau.01?igsh=MThvMzRqY3oxNTVkZw==" class="link-item" target="_blank">
            Instagram Profile 🔥
        </a>

        <!-- 3rd Button: Free Fire UID Copy Action -->
        <div class="link-item" id="ffButton" onclick="copyUID()">
            <span>Free Fire UID 🤷‍♂️</span>
            <div class="uid-number" id="uidText">UID: 1673944735 (Click to copy)</div>
        </div>
    </div>
</div>

<script>
function copyUID() {
    const uid = "1673944735";
    navigator.clipboard.writeText(uid).then(() => {
        const uidText = document.getElementById('uidText');
        uidText.innerText = "UID Copied! ✅";
        uidText.style.color = "#00b4db";
        
        setTimeout(() => {
            uidText.innerText = "UID: " + uid + " (Click to copy)";
            uidText.style.color = "#a0aec0";
        }, 2000);
    }).catch(err => {
        console.error('Could not copy text: ', err);
    });
}
</script>

</body>
</html>
