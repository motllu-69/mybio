<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Sniper Client | Portal</title>
    <style>
        :root {
            --bg-color: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-hover: rgba(0, 229, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
            --sniper-cyan: #00e5ff;
            --sniper-blue: #0083b0;
            --glow: linear-gradient(135deg, var(--sniper-cyan) 0%, var(--sniper-blue) 100%);
            --youtube-red: #ff0000;
            --youtube-hover: rgba(255, 0, 0, 0.15);
            --discord-blurple: #5865F2;
            --discord-hover: rgba(88, 101, 242, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Pure CSS Minecraft Sniper Profile Icon */
        .pfp-logo-container {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: #121620;
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
            margin-bottom: 20px;
        }

        /* Crosshair Center Dot */
        .sniper-dot {
            width: 10px;
            height: 10px;
            background-color: var(--sniper-cyan);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--sniper-cyan);
        }

        /* Crosshair Reticle Lines */
        .sniper-line {
            position: absolute;
            background: var(--glow);
            box-shadow: 0 0 8px var(--sniper-cyan);
        }
        .line-v { width: 4px; height: 24px; }
        .line-h { width: 24px; height: 4px; }
        .pos-top { top: 12px; }
        .pos-bottom { bottom: 12px; }
        .pos-left { left: 12px; }
        .pos-right { right: 12px; }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            background: var(--glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(0, 229, 255, 0.1);
            color: var(--sniper-cyan);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        /* View-Switching Wrapper Setup */
        .view-panel {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        
        .view-panel.active {
            display: flex;
        }

        .link-item {
            display: block;
            text-decoration: none;
            color: var(--text-main);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .link-item:hover {
            transform: translateY(-2px);
        }

        /* Button Custom Variants */
        .youtube-btn:hover {
            background: var(--youtube-hover);
            border-color: var(--youtube-red);
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.15);
        }

        .sniper-btn:hover {
            background: var(--card-hover);
            border-color: var(--sniper-cyan);
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.15);
        }

        .discord-btn {
            background: rgba(88, 101, 242, 0.1);
            border-color: rgba(88, 101, 242, 0.3);
        }
        .discord-btn:hover {
            background: var(--discord-hover);
            border-color: var(--discord-blurple);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }

        .back-btn {
            border-style: dashed;
            color: var(--text-muted);
            margin-top: 10px;
        }
        .back-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }

        /* Tier Features List Box Styling */
        .features-list {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .features-list h3 {
            margin: 0 0 12px 0;
            color: var(--sniper-cyan);
            font-size: 16px;
            text-align: center;
        }
        .features-list ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .features-list li {
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
        }
        .tier-tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .tag-default { background: rgba(100, 116, 139, 0.2); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.3); }
        .tag-normal { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .tag-premium { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 8px rgba(168, 85, 247, 0.2); }
        .tag-ultra { background: linear-gradient(135deg, rgba(234, 179, 8, 0.2), rgba(249, 115, 22, 0.2)); color: #fbbf24; border: 1px solid rgba(234, 179, 8, 0.3); box-shadow: 0 0 10px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <!-- Pure CSS Generated Profile Logo -->
    <div class="pfp-logo-container">
        <div class="sniper-line line-v pos-top"></div>
        <div class="sniper-line line-v pos-bottom"></div>
        <div class="sniper-line line-h pos-left"></div>
        <div class="sniper-line line-h pos-right"></div>
        <div class="sniper-dot"></div>
    </div>
    
    <h1>Tier Queue Sniper</h1>
    <div class="status-badge" id="statusPanel">🟢 System Online</div>

    <!-- MAIN HOME PAGE -->
    <div id="homePage" class="view-panel active">
        <!-- YouTube Link Button Only -->
        <a href="https://youtube.com/@motllugaming?si=WHJTxWYa711FzVej" class="link-item youtube-btn" target="_blank">
            YouTube Channel 📺
        </a>

        <!-- Queue Sniper Website Button (Opens Internal Sub-Page) -->
        <div class="link-item sniper-btn" onclick="switchPage('sniperPage')">
            Queue Sniper Site Info 🎯
        </div>
    </div>

    <!-- INTERNAL QUEUE SNIPER SUB-PAGE -->
    <div id="sniperPage" class="view-panel">
        <!-- Client Features Display Panel with Tier Options -->
        <div class="features-list">
            <h3>⚡ Select Your Tier Package</h3>
            <ul>
                <li>
                    <span>Standard Features</span>
                    <span class="tier-tag tag-default">Default</span>
                </li>
                <li>
                    <span>Enhanced Priority Sniper</span>
                    <span class="tier-tag tag-normal">Normal</span>
                </li>
                <li>
                    <span>Super-Fast Advanced Bypass</span>
                    <span class="tier-tag tag-premium">Premium</span>
                </li>
                <li>
                    <span>Maximum Speed + Instant Alerts</span>
                    <span class="tier-tag tag-ultra">Ultra Premium</span>
                </li>
            </ul>
        </div>

        <!-- Buy Now Redirection Button to Discord Server -->
        <a href="https://discord.gg/YOUR_DISCORD_INVITE_LINK" class="link-item discord-btn" target="_blank">
            🛒 Buy Now via Discord
        </a>

        <!-- Navigation Button Back to Main Directory Menu -->
        <div class="link-item back-btn" onclick="switchPage('homePage')">
            ← Go Back Home
        </div>
    </div>
</div>

<script>
function switchPage(pageId) {
    document.getElementById('homePage').classList.remove('active');
    document.getElementById('sniperPage').classList.remove('active');
    
    document.getElementById(pageId).classList.add('active');
    
    const status = document.getElementById('statusPanel');
    if(pageId === 'sniperPage') {
        status.innerText = "⚡ Client Tiers";
    } else {
        status.innerText = "🟢 System Online";
    }
}
</script>

</body>
</html>
